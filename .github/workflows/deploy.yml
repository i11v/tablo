name: Deploy (production)

on:
  push:
    branches: [main]

# Serialize production deploys; never cancel mid-flight (Alchemy writes state).
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build:index   # public GTFS download, no token needed
      - run: bun run build:web
      - name: Deploy to production
        run: bunx alchemy deploy --stage production --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOLEMIO_API_TOKEN: ${{ secrets.GOLEMIO_API_TOKEN }}
