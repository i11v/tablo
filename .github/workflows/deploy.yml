name: Deploy (production)

on:
  push:
    branches: [main]

# Serialize production deploys; never cancel mid-flight (Alchemy writes state).
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # don't hold the deploy-production concurrency slot for the 360-min default
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - name: Cache GTFS feed   # fallback so a data.pid.cz outage can't block a deploy
        uses: actions/cache@v5
        with:
          path: .cache
          key: gtfs-${{ github.run_id }}   # always save this run's fresh copy…
          restore-keys: gtfs-              # …and restore the most recent prior one
      - run: bun run build:index   # public GTFS download, no token needed
      - run: bun run build:web
      - run: bun run verify:pwa
      - name: Require CF_WORKERS_SUBDOMAIN
        env: { CF_WORKERS_SUBDOMAIN: "${{ vars.CF_WORKERS_SUBDOMAIN }}" }
        run: |
          # Fail before deploying: with the variable unset the deploy would
          # succeed and the smoke test would then curl "tablo..workers.dev"
          # for 72s and report a config error as an outage.
          if [ -z "$CF_WORKERS_SUBDOMAIN" ]; then
            echo "::error::CF_WORKERS_SUBDOMAIN repo variable is not set."
            exit 1
          fi
      - name: Deploy to production
        run: bunx alchemy deploy --stage production --yes
        env:
          TABLO_STAGE: production   # consumed by the worker to name itself `tablo`
          TABLO_COMMIT: ${{ github.sha }}   # served by /api/health; asserted below
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOLEMIO_API_TOKEN: ${{ secrets.GOLEMIO_API_TOKEN }}
      - name: Smoke test (/api/health serves this commit)
        env:
          URL: https://tablo.${{ vars.CF_WORKERS_SUBDOMAIN }}.workers.dev
          EXPECTED: ${{ github.sha }}
        run: |
          # Assert the deployed build, not just a 200 — a previous build's
          # health endpoint also answers 200.
          for i in $(seq 1 12); do
            body=$(curl -sS "$URL/api/health" || echo "")
            echo "attempt $i: $URL/api/health -> $body"
            if echo "$body" | grep -q "\"version\":\"$EXPECTED\""; then exit 0; fi
            sleep 6
          done
          echo "::error::production health check failed: $URL/api/health never served version $EXPECTED"
          exit 1
